{% extends 'main/base.html' %}

{% block title %}Удаление заказа{% endblock %}

{% block content %}
<h1>Удаление заказа</h1>
<p>Вы уверены, что хотите удалить заказ "{{ order.order_number }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn">Да, удалить</button>
    <a href="{% url 'order_list' %}" class="btn btn-cancel">Отмена</a>
</form>
{% endblock %}
