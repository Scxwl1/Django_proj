{% extends 'main/base.html' %}

{% block title %}Удаление товара{% endblock %}

{% block content %}
<h1>Удаление товара</h1>
<p>Вы уверены, что хотите удалить товар "{{ product.name }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn">Да, удалить</button>
    <a href="{% url 'product_list' %}" class="btn btn-cancel">Отмена</a>
</form>
{% endblock %}
